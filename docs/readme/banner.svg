<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="Snap and Sort">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="50%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1200" height="360" fill="url(#bg)"/>
  <circle cx="1000" cy="80" r="120" fill="#fff" opacity="0.08"/>
  <circle cx="150" cy="280" r="90" fill="#fff" opacity="0.06"/>
  <g filter="url(#shadow)">
    <rect x="80" y="70" width="1040" height="220" rx="24" fill="#ffffff" opacity="0.95"/>
  </g>
  <text x="120" y="160" font-family="system-ui,Segoe UI,sans-serif" font-size="52" font-weight="800" fill="#0f172a">Snap&amp;Sort</text>
  <text x="120" y="215" font-family="system-ui,Segoe UI,sans-serif" font-size="22" fill="#475569">Smart waste sorting for Zagreb</text>
  <text x="120" y="255" font-family="system-ui,Segoe UI,sans-serif" font-size="15" fill="#64748b">Scan · Map · Calendar · Profile &amp; gamification</text>
  <g transform="translate(920 100)">
    <rect width="160" height="160" rx="20" fill="#ecfdf5" stroke="#22c55e" stroke-width="3"/>
    <text x="80" y="100" text-anchor="middle" font-size="72">♻️</text>
  </g>
</svg>
